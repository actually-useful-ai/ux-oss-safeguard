<!DOCTYPE html>
<html lang="en" data-theme="dark" data-font-size="md" data-reduced-motion="false">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ollama Chat with Thinking</title>
    <style>
        /* ---- CSS Custom Properties ---- */
        :root {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --surface: rgba(0,0,0,0.2);
            --surface-input: rgba(0,0,0,0.4);
            --border: rgba(255,255,255,0.1);
            --border-subtle: rgba(255,255,255,0.05);
            --text: #e0e0e0;
            --text-muted: #9ca3af;
            --text-dim: #6b7280;
            --accent: #00d4ff;
            --accent-2: #7c3aed;
            --chip-bg: rgba(255,255,255,0.05);
            --chip-border: rgba(255,255,255,0.1);
            --placeholder-color: rgba(255,255,255,0.4);
            --font-size-base: 15px;
        }

        [data-theme="light"] {
            --bg-gradient: linear-gradient(135deg, #f0f4ff 0%, #e8eeff 50%, #dde8ff 100%);
            --surface: rgba(255,255,255,0.75);
            --surface-input: rgba(255,255,255,0.9);
            --border: rgba(0,0,0,0.12);
            --border-subtle: rgba(0,0,0,0.07);
            --text: #1e1e2e;
            --text-muted: #4b5563;
            --text-dim: #6b7280;
            --accent: #0369a1;
            --accent-2: #6d28d9;
            --chip-bg: rgba(0,0,0,0.04);
            --chip-border: rgba(0,0,0,0.1);
            --placeholder-color: rgba(0,0,0,0.3);
        }

        [data-font-size="sm"] { --font-size-base: 13px; }
        [data-font-size="md"] { --font-size-base: 15px; }
        [data-font-size="lg"] { --font-size-base: 17px; }
        [data-font-size="xl"] { --font-size-base: 20px; }

        html { font-size: var(--font-size-base); }

        [data-reduced-motion="true"] * {
            animation-duration: 0.01ms !important;
            transition-duration: 0.01ms !important;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1rem 2rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .nav-links {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }

        .nav-link {
            padding: 0.25rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 99px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.15s;
        }

        .nav-link:hover { background: var(--chip-bg); color: var(--text); }
        .nav-link.active { background: rgba(0,212,255,0.12); border-color: rgba(0,212,255,0.3); color: var(--accent); }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Settings button + panel */
        .settings-btn {
            background: none; border: 1px solid var(--border); border-radius: 6px;
            color: var(--text-muted); cursor: pointer; padding: 0.2rem 0.5rem;
            font-size: 1rem; line-height: 1; transition: color 0.15s;
        }
        .settings-btn:hover { color: var(--text); }

        .settings-panel {
            position: fixed; top: 3.5rem; right: 1rem; z-index: 100;
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 1rem; min-width: 200px;
            backdrop-filter: blur(12px);
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
            display: flex; flex-direction: column; gap: 0.85rem;
        }

        .settings-section { display: flex; flex-direction: column; gap: 0.4rem; }
        .settings-label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
        .settings-row { display: flex; gap: 0.4rem; align-items: center; flex-wrap: wrap; }

        .setting-opt {
            padding: 0.25rem 0.65rem; border-radius: 6px;
            border: 1px solid var(--chip-border); background: var(--chip-bg);
            color: var(--text-muted); font-size: 0.8rem; cursor: pointer; transition: all 0.15s;
        }
        .setting-opt:hover { background: rgba(255,255,255,0.1); color: var(--text); }
        .setting-opt.active { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,0.1); }

        .toggle-label { font-size: 0.85rem; color: var(--text-muted); display: flex; gap: 0.5rem; align-items: center; cursor: pointer; }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            scroll-behavior: smooth;
        }

        .message {
            margin-bottom: 1.5rem;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .message-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .message-header.user {
            justify-content: flex-end;
        }

        .message-header.assistant {
            justify-content: flex-start;
        }

        .avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .avatar.user {
            background: linear-gradient(135deg, #f59e0b, #ef4444);
        }

        .avatar.assistant {
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
        }

        .name {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .message.user .name {
            order: 2;
        }

        .message-content {
            padding: 1rem;
            border-radius: 12px;
            line-height: 1.7;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: rgba(245, 158, 11, 0.2);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .message.assistant .message-content {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .thinking {
            background: rgba(124, 58, 237, 0.15);
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 8px;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .thinking-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            background: rgba(124, 58, 237, 0.2);
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 500;
            color: #a78bfa;
        }

        .thinking-header:hover {
            background: rgba(124, 58, 237, 0.3);
        }

        .thinking-content {
            padding: 0 1rem 1rem 1rem;
            color: #c4b5fd;
            font-size: 0.9rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .thinking-content.collapsed {
            display: none;
        }

        .thinking-icon {
            transition: transform 0.3s ease;
        }

        .thinking.collapsed .thinking-icon {
            transform: rotate(-90deg);
        }

        .thinking.collapsed .thinking-content {
            display: none;
        }

        .input-area {
            padding: 1.5rem 2rem;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        textarea {
            width: 100%;
            padding: 1rem 1rem 3rem 1rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--surface-input);
            color: var(--text);
            font-size: 1rem;
            font-family: inherit;
            resize: none;
            min-height: 60px;
            max-height: 200px;
        }

        textarea:focus {
            outline: none;
            border-color: var(--accent);
        }

        textarea::placeholder {
            color: var(--placeholder-color);
        }

        .send-button {
            position: absolute;
            bottom: 0.75rem;
            right: 0.75rem;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #00d4ff, #7c3aed);
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .send-button:hover {
            opacity: 0.9;
        }

        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .clear-button {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .clear-button:hover {
            background: var(--chip-bg);
            color: var(--text);
        }

        .loading {
            display: inline-flex;
            align-items: center;
            gap: 0.65rem;
            padding: 0.85rem 1.2rem;
            border-radius: 10px;
            background: rgba(124, 58, 237, 0.18);
            border: 1px solid rgba(124, 58, 237, 0.3);
            margin-left: auto;
            margin-right: auto;
            animation: neural-glow 1.6s ease-in-out infinite;
        }

        @keyframes neural-glow {
            0%, 100% { box-shadow: 0 0 6px rgba(167,139,250,0.25); }
            50% { box-shadow: 0 0 14px rgba(167,139,250,0.55); }
        }

        .neural-dots {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .neural-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #a78bfa;
            animation: neural-pulse 1.2s ease-in-out infinite;
        }

        .neural-dot:nth-child(2) { animation-delay: 0.2s; }
        .neural-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes neural-pulse {
            0%, 100% { transform: scale(0.6); opacity: 0.4; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .example-prompts {
            padding: 1rem 2rem;
            background: var(--surface);
            border-bottom: 1px solid var(--border-subtle);
        }

        .example-prompts h3 {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .example-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .chip {
            padding: 0.3rem 0.75rem;
            background: var(--chip-bg);
            border: 1px solid var(--chip-border);
            border-radius: 99px;
            font-size: 0.8rem;
            color: var(--text-muted);
            cursor: pointer;
            transition: all 0.2s;
        }

        .chip:hover {
            background: rgba(255,255,255,0.1);
            color: var(--text);
        }

        .error {
            color: #f87171;
            font-size: 0.875rem;
            text-align: center;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>🧠 Ollama Chat</h1>
        <nav class="nav-links">
            <a class="nav-link active" href="./ollama-chat.html">Chat</a>
            <a class="nav-link" href="./safeguard.html">Safeguard</a>
            <button class="settings-btn" id="settingsBtn" aria-label="Accessibility settings">&#9881;</button>
        </nav>
    </header>

    <div class="settings-panel" id="settingsPanel" hidden>
        <div class="settings-section">
            <div class="settings-label">Theme</div>
            <div class="settings-row">
                <button class="setting-opt" data-setting="theme" data-value="dark">Dark</button>
                <button class="setting-opt" data-setting="theme" data-value="light">Light</button>
            </div>
        </div>
        <div class="settings-section">
            <div class="settings-label">Font size</div>
            <div class="settings-row">
                <button class="setting-opt" data-setting="fontSize" data-value="sm">S</button>
                <button class="setting-opt" data-setting="fontSize" data-value="md">M</button>
                <button class="setting-opt" data-setting="fontSize" data-value="lg">L</button>
                <button class="setting-opt" data-setting="fontSize" data-value="xl">XL</button>
            </div>
        </div>
        <div class="settings-section">
            <div class="settings-row">
                <label class="toggle-label">
                    <input type="checkbox" id="reducedMotionToggle"> Reduce motion
                </label>
            </div>
        </div>
    </div>

    <div class="example-prompts">
        <h3>Try these prompts:</h3>
        <div class="example-chips">
            <span class="chip" onclick="setPrompt('Explain quantum computing simply')">Explain quantum computing</span>
            <span class="chip" onclick="setPrompt('Write a poem about coding')">Write a poem</span>
            <span class="chip" onclick="setPrompt('How do you think about complex problems?')">Show your thinking</span>
            <span class="chip" onclick="setPrompt('Debug this code: function add(a, b) { return a + b; }')">Debug this code</span>
        </div>
    </div>

    <div class="chat-container" id="chatContainer"></div>

    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="messageInput" placeholder="Type your message..." rows="1"></textarea>
            <button class="send-button" id="sendBtn">Send</button>
        </div>
    </div>

    <script>
        // Configuration
        const config = {
            url: 'http://localhost:3000',
            model: 'gpt-oss-safeguard',
            stream: true
        };

        // State
        let messages = [];
        let isConnected = true;
        let abortController = null;

        // DOM Elements
        const chatContainer = document.getElementById('chatContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');

        // Initialize
        function init() {
            messageInput.addEventListener('input', autoResize);
            messageInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
            sendBtn.addEventListener('click', sendMessage);
            autoResize();
        }

        function autoResize() {
            messageInput.style.height = 'auto';
            messageInput.style.height = Math.min(messageInput.scrollHeight, 200) + 'px';
        }

        function setPrompt(text) {
            messageInput.value = text;
            autoResize();
            messageInput.focus();
        }

        function appendMessage(role, content, thinking = null) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const header = document.createElement('div');
            header.className = `message-header ${role}`;
            header.innerHTML = `
                <span class="avatar ${role}">${role === 'user' ? '👤' : '🤖'}</span>
                <span class="name">${role === 'user' ? 'You' : 'Ollama'}</span>
            `;

            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            messageContent.textContent = content;

            messageDiv.appendChild(header);

            if (thinking) {
                const thinkingDiv = document.createElement('div');
                thinkingDiv.className = 'thinking';
                thinkingDiv.innerHTML = `
                    <div class="thinking-header" onclick="toggleThinking(this)">
                        <span class="thinking-icon">▼</span>
                        <span>💭 Reasoning</span>
                    </div>
                    <div class="thinking-content">${escapeHtml(thinking)}</div>
                `;
                messageDiv.appendChild(thinkingDiv);
            }

            messageDiv.appendChild(messageContent);
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function appendLoading() {
            const loadingDiv = document.createElement('div');
            loadingDiv.id = 'loading';
            loadingDiv.className = 'message assistant';
            loadingDiv.innerHTML = `
                <div class="loading">
                    <div class="neural-dots">
                        <div class="neural-dot"></div>
                        <div class="neural-dot"></div>
                        <div class="neural-dot"></div>
                    </div>
                    <span style="font-size:0.85rem;color:#c4b5fd">Processing…</span>
                </div>
            `;
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeLoading() {
            const loading = document.getElementById('loading');
            if (loading) loading.remove();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function toggleThinking(header) {
            const thinkingDiv = header.parentElement;
            thinkingDiv.classList.toggle('collapsed');
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !isConnected) return;

            messageInput.value = '';
            messageInput.style.height = '60px';
            removeLoading();

            messages.push({ role: 'user', content: text });
            appendMessage('user', text);

            const responseDiv = document.createElement('div');
            responseDiv.className = 'message assistant';
            responseDiv.id = 'response';

            const responseHeader = document.createElement('div');
            responseHeader.className = 'message-header assistant';
            responseHeader.innerHTML = `
                <span class="avatar assistant">🤖</span>
                <span class="name">Ollama</span>
            `;
            responseDiv.appendChild(responseHeader);

            // Thinking block (hidden until we get thinking tokens)
            const liveThinkingDiv = document.createElement('div');
            liveThinkingDiv.className = 'thinking';
            liveThinkingDiv.style.display = 'none';
            liveThinkingDiv.innerHTML = `
                <div class="thinking-header" onclick="toggleThinking(this)">
                    <span class="thinking-icon">▼</span>
                    <span>💭 Reasoning</span>
                </div>
                <div class="thinking-content"></div>
            `;
            responseDiv.appendChild(liveThinkingDiv);

            const responseContent = document.createElement('div');
            responseContent.className = 'message-content';
            responseDiv.appendChild(responseContent);

            chatContainer.appendChild(responseDiv);

            let fullContent = '';
            let fullThinking = '';

            try {
                abortController = new AbortController();

                const response = await fetch(`${config.url}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: config.model,
                        messages: messages,
                        stream: config.stream,
                        options: {
                            temperature: 0.7,
                            num_predict: 4096
                        }
                    }),
                    signal: abortController.signal
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n').filter(line => line.trim());

                    for (const line of lines) {
                        try {
                            const data = JSON.parse(line);
                            const content = data.message?.content || '';
                            const thinking = data.message?.thinking || '';

                            if (thinking) {
                                fullThinking += thinking;
                                liveThinkingDiv.style.display = '';
                                liveThinkingDiv.querySelector('.thinking-content').textContent = fullThinking;
                            }

                            if (content) {
                                fullContent += content;
                                responseContent.textContent = fullContent;
                            }

                            chatContainer.scrollTop = chatContainer.scrollHeight;
                        } catch (e) {
                            console.error('Error parsing chunk:', e);
                        }
                    }
                }

                messages.push({ role: 'assistant', content: fullContent });

            } catch (error) {
                removeLoading();
                responseDiv.querySelector('.message-content').textContent = `Error: ${error.message}`;
                if (error.name === 'AbortError') {
                    responseDiv.querySelector('.message-content').textContent += ' (Request cancelled)';
                }
            } finally {
                abortController = null;
            }
        }

        // Initialize on load
        init();

        // ---- Accessibility Settings ----
        const SETTINGS_KEY = 'a11ySettings';
        const defaults = { theme: 'dark', fontSize: 'md', reducedMotion: false };

        function loadSettings() {
            const saved = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
            return { ...defaults, ...saved };
        }

        function applySettings(s) {
            document.documentElement.dataset.theme = s.theme;
            document.documentElement.dataset.fontSize = s.fontSize;
            document.documentElement.dataset.reducedMotion = s.reducedMotion;
            document.querySelectorAll('.setting-opt').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.value === s[btn.dataset.setting]);
            });
            document.getElementById('reducedMotionToggle').checked = s.reducedMotion;
        }

        function saveSettings(s) {
            localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
        }

        let settings = loadSettings();
        applySettings(settings);

        document.getElementById('settingsBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            const panel = document.getElementById('settingsPanel');
            panel.hidden = !panel.hidden;
        });

        document.addEventListener('click', () => {
            document.getElementById('settingsPanel').hidden = true;
        });

        document.getElementById('settingsPanel').addEventListener('click', e => e.stopPropagation());

        document.querySelectorAll('.setting-opt').forEach(btn => {
            btn.addEventListener('click', () => {
                settings[btn.dataset.setting] = btn.dataset.value;
                saveSettings(settings);
                applySettings(settings);
            });
        });

        document.getElementById('reducedMotionToggle').addEventListener('change', (e) => {
            settings.reducedMotion = e.target.checked;
            saveSettings(settings);
            applySettings(settings);
        });
    </script>
</body>
</html>
