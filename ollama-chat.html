<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="/assets/images/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat · Safeguard · IO Suite</title>
  <meta name="description" content="Chat interface for local Ollama models with live thinking display">
  <link rel="stylesheet" href="/io/shared/css/io-theme.css">
  <script src="/io/shared/js/theme.js"></script>
  <style>
    /* ─── Chat-specific ─── */
    body { padding: 0; display: flex; flex-direction: column; min-height: 100vh; }

    .sg-header {
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .sg-header-left { display: flex; align-items: center; gap: 12px; }

    .sg-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .sg-nav { display: flex; gap: 4px; }

    .sg-nav a {
      padding: 4px 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text-1);
      text-decoration: none;
      transition: all var(--ease);
    }

    .sg-nav a:hover { border-color: var(--border-hover); color: var(--text-0); }
    .sg-nav a.active { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

    .sg-header-right { display: flex; gap: 8px; align-items: center; }

    /* ─── Example prompts bar ─── */
    .example-bar {
      padding: 10px 24px;
      background: var(--bg-1);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
    }

    .example-bar-label {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-2);
      white-space: nowrap;
    }

    .example-btn {
      padding: 4px 12px;
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-1);
      cursor: pointer;
      transition: all var(--ease);
      white-space: nowrap;
      font-family: var(--font);
    }

    .example-btn:hover { border-color: var(--accent); color: var(--accent); }
    .example-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ─── Chat area ─── */
    .chat-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      scroll-behavior: smooth;
    }

    .message {
      margin-bottom: 20px;
      max-width: 760px;
      margin-left: auto;
      margin-right: auto;
    }

    .msg-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .msg-header.user { justify-content: flex-end; }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    .msg-avatar.user { background: var(--accent-soft); color: var(--accent); }
    .msg-avatar.assistant { background: var(--bg-3); color: var(--text-1); }

    .msg-name {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-2);
    }

    .msg-body {
      padding: 12px 16px;
      border-radius: var(--radius);
      line-height: 1.65;
      word-wrap: break-word;
      font-size: 0.9rem;
    }

    .message.user .msg-body {
      background: var(--accent-soft);
      border: 1px solid rgba(79, 70, 229, 0.15);
    }

    .message.assistant .msg-body {
      background: var(--bg-1);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
    }

    [data-theme="dark"] .message.user .msg-body {
      background: rgba(129, 140, 248, 0.08);
      border-color: rgba(129, 140, 248, 0.15);
    }

    /* ─── Thinking block ─── */
    .thinking-block {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 10px;
      overflow: hidden;
    }

    .thinking-toggle {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-2);
      width: 100%;
      text-align: left;
      font-family: var(--font);
      transition: color var(--ease);
    }

    .thinking-toggle:hover { color: var(--text-0); }

    .thinking-arrow {
      font-size: 0.6rem;
      transition: transform 0.2s;
      display: inline-block;
    }

    .thinking-block.collapsed .thinking-arrow { transform: rotate(-90deg); }
    .thinking-block.collapsed .thinking-body { display: none; }

    .thinking-body {
      padding: 0 12px 10px;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--text-1);
      line-height: 1.55;
      white-space: pre-wrap;
    }

    /* ─── Loading indicator ─── */
    .loading-indicator {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: var(--radius-sm);
      background: var(--bg-2);
      border: 1px solid var(--border);
    }

    .loading-dots { display: flex; gap: 4px; }

    .loading-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: dot-pulse 1.2s ease-in-out infinite;
    }

    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-pulse {
      0%, 100% { transform: scale(0.6); opacity: 0.3; }
      50% { transform: scale(1); opacity: 1; }
    }

    .loading-text {
      font-size: 0.78rem;
      color: var(--text-2);
    }

    /* ─── Input area ─── */
    .input-area {
      padding: 16px 24px;
      background: var(--bg-1);
      border-top: 1px solid var(--border);
    }

    .input-wrap {
      max-width: 760px;
      margin: 0 auto;
      position: relative;
    }

    .input-wrap textarea {
      width: 100%;
      padding: 12px 80px 12px 14px;
      min-height: 48px;
      max-height: 180px;
      resize: none;
      border-radius: var(--radius);
    }

    .send-btn {
      position: absolute;
      bottom: 8px;
      right: 8px;
      padding: 6px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: background var(--ease);
      font-family: var(--font);
    }

    .send-btn:hover { background: var(--accent-hover); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .send-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .thinking-toggle:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }

    /* ─── Responsive ─── */
    @media (max-width: 480px) {
      .sg-header { padding: 10px 14px; }
      .chat-scroll { padding: 16px; }
      .input-area { padding: 12px 14px; }
    }
  </style>
</head>
<body>
  <header class="sg-header">
    <div class="sg-header-left">
      <a href="/io/" class="io-back" aria-label="Back to IO Suite">IO</a>
      <span class="sg-title">Safeguard</span>
      <nav class="sg-nav" aria-label="Tool navigation">
        <a href="/io/safeguard/">Evaluate</a>
        <a href="/io/safeguard/chat" class="active" aria-current="page">Chat</a>
      </nav>
    </div>
    <div class="sg-header-right">
      <button class="theme-toggle" aria-label="Toggle theme">Dark</button>
    </div>
  </header>

  <div class="example-bar" role="group" aria-labelledby="example-bar-label">
    <span class="example-bar-label" id="example-bar-label">Try:</span>
    <button class="example-btn" onclick="setPrompt('Explain quantum computing simply')">Quantum computing</button>
    <button class="example-btn" onclick="setPrompt('Write a poem about coding')">Write a poem</button>
    <button class="example-btn" onclick="setPrompt('How do you think about complex problems?')">Show thinking</button>
    <button class="example-btn" onclick="setPrompt('Debug this code: function add(a, b) { return a + b; }')">Debug code</button>
  </div>

  <div class="chat-scroll" id="chatContainer" role="log" aria-label="Chat messages"></div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="messageInput" placeholder="Type your message..." rows="1" aria-label="Message input"></textarea>
      <button class="send-btn" id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    // ── Config ──
    const config = {
      model: 'gpt-oss-safeguard',
      stream: true
    };

    const API_BASE = location.hostname === 'localhost'
      ? `${location.origin}`
      : `${location.origin}/io/safeguard`;

    let messages = [];
    let abortController = null;

    const chatContainer = document.getElementById('chatContainer');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');

    function init() {
      messageInput.addEventListener('input', autoResize);
      messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });
      sendBtn.addEventListener('click', sendMessage);
      autoResize();
    }

    function autoResize() {
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 180) + 'px';
    }

    function setPrompt(text) {
      messageInput.value = text;
      autoResize();
      messageInput.focus();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function toggleThinking(btn) {
      const block = btn.closest('.thinking-block');
      block.classList.toggle('collapsed');
      btn.setAttribute('aria-expanded', String(!block.classList.contains('collapsed')));
    }

    function appendMessage(role, content, thinking) {
      const div = document.createElement('div');
      div.className = `message ${role}`;

      const header = document.createElement('div');
      header.className = `msg-header ${role}`;
      header.innerHTML = `
        <span class="msg-avatar ${role}" aria-hidden="true">${role === 'user' ? 'U' : 'S'}</span>
        <span class="msg-name">${role === 'user' ? 'You' : 'Safeguard'}</span>
      `;
      div.appendChild(header);

      if (thinking) {
        const tb = document.createElement('div');
        tb.className = 'thinking-block';
        tb.innerHTML = `
          <button class="thinking-toggle" onclick="toggleThinking(this)" aria-expanded="true">
            <span class="thinking-arrow" aria-hidden="true">\u25BC</span>
            Reasoning
          </button>
          <div class="thinking-body">${escapeHtml(thinking)}</div>
        `;
        div.appendChild(tb);
      }

      const body = document.createElement('div');
      body.className = 'msg-body';
      body.textContent = content;
      div.appendChild(body);

      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function sendMessage() {
      const text = messageInput.value.trim();
      if (!text) return;

      messageInput.value = '';
      messageInput.style.height = '48px';

      messages.push({ role: 'user', content: text });
      appendMessage('user', text);

      // Build live response container
      const responseDiv = document.createElement('div');
      responseDiv.className = 'message assistant';
      responseDiv.id = 'response';

      const rHeader = document.createElement('div');
      rHeader.className = 'msg-header assistant';
      rHeader.innerHTML = `
        <span class="msg-avatar assistant" aria-hidden="true">S</span>
        <span class="msg-name">Safeguard</span>
      `;
      responseDiv.appendChild(rHeader);

      const liveThinking = document.createElement('div');
      liveThinking.className = 'thinking-block';
      liveThinking.style.display = 'none';
      liveThinking.innerHTML = `
        <button class="thinking-toggle" onclick="toggleThinking(this)" aria-expanded="true">
          <span class="thinking-arrow" aria-hidden="true">\u25BC</span>
          Reasoning
        </button>
        <div class="thinking-body"></div>
      `;
      responseDiv.appendChild(liveThinking);

      const rBody = document.createElement('div');
      rBody.className = 'msg-body';

      // Show loading dots
      rBody.innerHTML = `<div class="loading-indicator">
        <div class="loading-dots"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>
        <span class="loading-text">Thinking...</span>
      </div>`;
      responseDiv.appendChild(rBody);
      chatContainer.appendChild(responseDiv);
      chatContainer.scrollTop = chatContainer.scrollHeight;

      sendBtn.disabled = true;
      let fullContent = '';
      let fullThinking = '';

      try {
        abortController = new AbortController();

        const response = await fetch(`${API_BASE}/api/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: config.model,
            messages,
            stream: config.stream,
            options: { temperature: 0.7, num_predict: 4096 }
          }),
          signal: abortController.signal
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);

        // Clear loading dots on first token
        let firstToken = true;
        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const lines = decoder.decode(value).split('\n').filter(l => l.trim());
          for (const line of lines) {
            try {
              const data = JSON.parse(line);
              const content = data.message?.content || '';
              const thinking = data.message?.thinking || '';

              if (firstToken && (content || thinking)) {
                rBody.textContent = '';
                firstToken = false;
              }

              if (thinking) {
                fullThinking += thinking;
                liveThinking.style.display = '';
                liveThinking.querySelector('.thinking-body').textContent = fullThinking;
              }

              if (content) {
                fullContent += content;
                rBody.textContent = fullContent;
              }

              chatContainer.scrollTop = chatContainer.scrollHeight;
            } catch {}
          }
        }

        messages.push({ role: 'assistant', content: fullContent });

      } catch (error) {
        if (error.name === 'AbortError') {
          rBody.textContent = fullContent || '(Cancelled)';
        } else {
          rBody.textContent = `Error: ${error.message}`;
        }
      } finally {
        sendBtn.disabled = false;
        abortController = null;
      }
    }

    init();
  </script>
</body>
</html>
